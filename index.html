<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ari 🤍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --beige:#F6EFE6;
    --white:#FFFBF7;
    --blush:#F4D9DE;
    --lavender:#E7DBF2;
    --rose:#D9A6B3;
    --plum:#5B4457;
    --plum-soft:#8A7288;
    --gold:#E8C9A0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Quicksand', sans-serif;
    color:var(--plum);
    background:linear-gradient(160deg, var(--beige) 0%, var(--blush) 45%, var(--lavender) 100%);
    background-attachment:fixed;
  }
  .serif{ font-family:'Cormorant Garamond', serif; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  #bg-blobs{ position:fixed; inset:0; z-index:0; overflow:hidden; filter:blur(50px); opacity:.6; pointer-events:none; }
  .blob{ position:absolute; border-radius:50%; }
  .blob1{ width:340px; height:340px; background:var(--blush); top:-80px; left:-60px; animation:drift1 22s ease-in-out infinite; }
  .blob2{ width:300px; height:300px; background:var(--lavender); bottom:-90px; right:-60px; animation:drift2 26s ease-in-out infinite; }
  .blob3{ width:220px; height:220px; background:var(--gold); opacity:.5; top:40%; left:60%; animation:drift3 30s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
  @keyframes drift3{ 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,50px) scale(1.15)} }

  main{ position:relative; z-index:2; max-width:520px; margin:0 auto; padding:48px 20px 70px; }

  header{ text-align:center; margin-bottom:38px; }
  .eyebrow{
    font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--rose); margin-bottom:8px;
  }
  h1{
    font-family:'Cormorant Garamond', serif; font-weight:500; font-style:italic;
    font-size:clamp(32px,8vw,48px); margin:0 0 8px; color:var(--plum);
  }
  header p{ color:var(--plum-soft); font-size:14.5px; margin:0; }

  /* ---------- Weekly message card ---------- */
  .weekly-card{
    background:var(--white);
    border-radius:4px 4px 40px 4px;
    box-shadow:0 24px 50px rgba(90,60,80,.14);
    padding:34px 28px;
    margin-bottom:44px;
    position:relative;
    animation:cardIn 1s ease forwards;
    opacity:0; transform:translateY(14px);
  }
  @keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }
  .weekly-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg, var(--rose), var(--gold), var(--lavender));
    border-radius:4px 4px 0 0;
  }
  .weekly-label{
    font-size:12px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--rose); font-weight:600; margin-bottom:10px;
  }
  .weekly-text{
    font-family:'Cormorant Garamond', serif; font-size:clamp(19px,4.6vw,23px);
    line-height:1.55; color:var(--plum); margin:0;
  }
  .weekly-week-badge{
    display:inline-block; margin-top:16px; font-size:11.5px; color:var(--plum-soft);
    background:var(--lavender); padding:4px 12px; border-radius:20px;
  }

  /* ---------- Carousel ---------- */
  .carousel-section{ margin-bottom:20px; }
  .section-title{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:22px;
    text-align:center; margin:0 0 18px; color:var(--plum);
  }
  .carousel-wrap{ position:relative; }
  .carousel-track{
    display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    gap:14px; padding:6px 6px 18px;
    scrollbar-width:none;
  }
  .carousel-track::-webkit-scrollbar{ display:none; }
  .slide{
    flex:0 0 78%; scroll-snap-align:center;
    background:var(--white); border-radius:16px;
    box-shadow:0 16px 30px rgba(90,60,80,.14);
    overflow:hidden; padding-bottom:16px;
  }
  .slide-photo{
    width:100%; aspect-ratio:4/5; object-fit:cover; display:block;
    background:linear-gradient(135deg, var(--blush), var(--lavender));
  }
  .slide-placeholder{
    width:100%; aspect-ratio:4/5; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--blush), var(--lavender));
    font-size:38px; color:var(--white);
  }
  .slide-caption{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:15.5px;
    color:var(--plum-soft); text-align:center; padding:12px 16px 0;
  }
  .carousel-dots{ display:flex; justify-content:center; gap:7px; margin-top:6px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--lavender); transition:background .3s; }
  .dot.active{ background:var(--rose); }
  .carousel-hint{ text-align:center; font-size:12px; color:var(--plum-soft); margin-top:4px; }

  footer{ text-align:center; margin-top:50px; }
  footer .sig{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:600;
    font-size:22px; color:var(--rose);
  }

  #petals{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .petal{
    position:absolute; top:-5%; font-size:15px; opacity:.7;
    animation-name:fall; animation-timing-function:linear; animation-iteration-count:infinite;
  }
  @keyframes fall{
    0%{ transform:translateY(-10vh) translateX(0) rotate(0deg); }
    100%{ transform:translateY(110vh) translateX(30px) rotate(360deg); }
  }
</style>
</head>
<body>

<div id="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div id="petals"></div>

<main>
  <header>
    <div class="eyebrow">para você</div>
    <h1>Para Ari 🤍</h1>
    <p>um cantinho só seu, que se renova toda semana</p>
  </header>

  <section class="weekly-card">
    <div class="weekly-label">mensagem da semana</div>
    <p class="weekly-text" id="weeklyText">Carregando...</p>
    <div class="weekly-week-badge" id="weekBadge"></div>
  </section>

  <section class="carousel-section">
    <p class="section-title">momentos seus ✨</p>
    <div class="carousel-wrap">
      <div class="carousel-track" id="carouselTrack">
        <!-- Slides get generated by JS from the PHOTOS array below -->
      </div>
      <div class="carousel-dots" id="carouselDots"></div>
      <p class="carousel-hint">deslize para o lado →</p>
    </div>
  </section>

  <footer>
    <p style="color:var(--plum-soft); font-size:13.5px; margin-bottom:6px;">com muito carinho,</p>
    <div class="sig">— Ros 🤍</div>
  </footer>
</main>

    ];

  // 12-week rotating message cycle (mixed tender + fun tone, in Portuguese)
  const WEEKLY_MESSAGES = [
    "Essa semana é sua. Vai com tudo, do seu jeitinho único.",
    "Lembre-se: até nos dias bagunçados, você continua sendo incrível.",
    "Pequena pausa pra te lembrar que seu sorriso ilumina qualquer lugar.",
    "Essa semana, seja gentil com você mesma. Você merece esse carinho.",
    "Confesso que sua energia é contagiante — nunca perca isso.",
    "Se hoje tudo parecer difícil, respira. Você já superou coisas piores.",
    "Semana nova, motivos novos pra sorrir. Comece com uma música boa!",
    "Só passando pra dizer: você é mais forte do que imagina.",
    "Essa semana eu queria te dar um abraço apertado. Considere isso enviado 🤍",
    "Não esquece de se orgulhar das suas pequenas vitórias também.",
    "Você tem um jeito de tornar tudo mais leve. Continue sendo assim.",
    "Fechando o ciclo dessa temporada: obrigada por existir do jeitinho que é."
  ];

  const START_DATE = new Date(2026, 6, 13); // 13 de julho de 2026 = semana 1

  function getWeekIndex(){
    const now = new Date();
    const diffMs = now - START_DATE;
    const diffDays = Math.floor(diffMs / (1000*60*60*24));
    const weekNum = Math.floor(diffDays / 7);
    const idx = ((weekNum % WEEKLY_MESSAGES.length) + WEEKLY_MESSAGES.length) % WEEKLY_MESSAGES.length;
    return { idx, weekNum: weekNum >= 0 ? weekNum+1 : 1 };
  }

  function renderWeeklyMessage(){
    const { idx, weekNum } = getWeekIndex();
    document.getElementById('weeklyText').textContent = WEEKLY_MESSAGES[idx];
    document.getElementById('weekBadge').textContent = 'semana ' + weekNum;
  }
  renderWeeklyMessage();

  // Simple seeded pseudo-random generator so the "random" order
  // stays the same all week, then changes the following week.
  function seededRandom(seed){
    let s = seed % 2147483647;
    if (s <= 0) s += 2147483646;
    return function(){
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function shuffleWithSeed(array, seed){
    const arr = array.slice();
    const rand = seededRandom(seed);
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderCarousel(){
    const track = document.getElementById('carouselTrack');
    const dotsWrap = document.getElementById('carouselDots');
    track.innerHTML = '';
    dotsWrap.innerHTML = '';

    const { weekNum } = getWeekIndex();
    const orderedPhotos = shuffleWithSeed(PHOTOS, weekNum);

    orderedPhotos.forEach((photo, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.index = i;

      if(photo.src){
        const img = document.createElement('img');
        img.src = photo.src;
        img.className = 'slide-photo';
        img.alt = 'Ari';
        slide.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'slide-placeholder';
        ph.textContent = '🤍';
        slide.appendChild(ph);
      }

      if(photo.caption){
        const cap = document.createElement('div');
        cap.className = 'slide-caption';
        cap.textContent = photo.caption;
        slide.appendChild(cap);
      }

      track.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i===0 ? ' active' : '');
      dotsWrap.appendChild(dot);
    });

    const dots = dotsWrap.querySelectorAll('.dot');
    track.addEventListener('scroll', () => {
      const slideWidth = track.firstChild ? track.firstChild.getBoundingClientRect().width + 14 : 1;
      const current = Math.round(track.scrollLeft / slideWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }, { passive:true });
  }
  renderCarousel();

  // ---------- Falling petals ----------
  const petalEmojis = ['🌸','✿','❀'];
  const petalsLayer = document.getElementById('petals');
  for(let i=0;i<12;i++){
    const p = document.createElement('div');
    p.className='petal';
    p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    p.style.left = (Math.random()*100)+'vw';
    p.style.fontSize = (11 + Math.random()*10)+'px';
    p.style.animationDuration = (10 + Math.random()*10)+'s';
    p.style.animationDelay = '-'+(Math.random()*10)+'s';
    petalsLayer.appendChild(p);
  }
})();
